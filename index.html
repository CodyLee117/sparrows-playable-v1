<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sparrows — Tap to Spell</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@800;900&display=swap" rel="stylesheet">
<script src="mraid.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Nunito', '-apple-system', system-ui, sans-serif; user-select: none; -webkit-user-select: none; touch-action: manipulation; }
  /* Deep forest green matching actual gameplay */
  body { background: #3D5A3F; }

  #stage { position: relative; width: 100%; height: 100%; overflow: hidden; }

  /* --- Map background — bg.png 1080×3102, anchored to bottom (camera at the
         birdhouse hooks). Houses are placed/animated relative to the bg image
         in JS so they stay aligned at any stage size. The whole world pans
         slowly up and down via the .world wrapper. */
  .world {
    position: absolute; inset: 0;
    z-index: 0;
    animation: panUpDown 56s ease-in-out infinite alternate;
    will-change: transform;
  }
  @keyframes panUpDown {
    0%   { transform: translateY(0); }
    100% { transform: translateY(var(--pan-max, 0px)); }
  }

  .bg-img {
    position: absolute;
    pointer-events: none;
    z-index: 0;
    user-select: none;
    -webkit-user-drag: none;
  }
  .house {
    position: absolute;
    pointer-events: none;
    z-index: 1;
    will-change: transform;
    user-select: none;
    -webkit-user-drag: none;
  }
  .house img { width: 100%; height: 100%; display: block; }
  .house.h1 { animation: swingA 4.2s ease-in-out infinite; }
  .house.h2 { animation: swingB 5.1s ease-in-out infinite; }
  @keyframes swingA {
    0%,100% { transform: rotate(-4deg); }
    50%     { transform: rotate(4deg); }
  }
  @keyframes swingB {
    0%,100% { transform: rotate(4.5deg); }
    50%     { transform: rotate(-4.5deg); }
  }

  @keyframes idleBobble  { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
  @keyframes idleBobble2 { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
  @keyframes hop         { 0%,80%,100% { transform: translateY(0); } 85% { transform: translateY(-12px); } 90% { transform: translateY(0); } }
  @keyframes glide {
    0%   { left: -120px; top: 14%; opacity: 0; }
    10%  { opacity: 0.7; }
    50%  { top: 11%; }
    90%  { opacity: 0.7; }
    100% { left: 110%; top: 14%; opacity: 0; }
  }

  /* --- Top banner --- */
  .banner {
    position: absolute; top: 4%; left: 50%; transform: translateX(-50%);
    background: rgba(255,253,243,0.96);
    color: #3F2A12;
    padding: 9px 18px; border-radius: 14px;
    font-size: 15px; font-weight: 600;
    text-align: center; line-height: 1.25;
    box-shadow: 0 3px 12px rgba(0,0,0,0.30);
    z-index: 50; max-width: 90%;
  }
  .banner .target { color: #C2410C; font-size: 22px; font-weight: 700; letter-spacing: 1px; }
  .banner .hint-line { display: block; font-size: 11px; color: #6B4A2A; font-weight: 500; margin-top: 2px; letter-spacing: 0.3px; }

  /* --- Selection bar at bottom (matches actual game) --- */
  .selection-bar {
    position: absolute;
    bottom: 5%; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center;
    z-index: 30;
    width: 90%; max-width: 320px;
  }
  .word-output {
    display: flex; gap: 4px;
    min-height: 50px; align-items: center;
    margin-bottom: 4px;
  }
  .word-slot {
    width: 36px; height: 46px;
    background: rgba(255,253,243,0.28);
    border: 1px dashed rgba(255,253,243,0.4);
    border-radius: 9px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: rgba(255,253,243,0.4);
    font-family: 'Nunito', '-apple-system', system-ui, sans-serif;
    transition: all 0.18s ease;
  }
  .word-slot .ws-letter { font-size: 22px; font-weight: 700; line-height: 1; }
  .word-slot .ws-pts    { font-size: 9px; font-weight: 700; margin-top: 2px; line-height: 1; }
  .word-slot.filled {
    background: #FFFFFF;
    border: 0;
    color: #B8893A;
    transform: scale(1.04);
    box-shadow: 6px 2px 0 rgba(0,0,0,0.2);   /* matches selected SVG spec */
    animation: slotIn 0.3s ease-out;
  }
  .word-slot.filled .ws-pts { color: #B8893A; }
  @keyframes slotIn {
    0%   { transform: translateY(-12px) scale(0.7); opacity: 0; }
    60%  { transform: translateY(0) scale(1.12); opacity: 1; }
    100% { transform: translateY(0) scale(1.04); }
  }
  .points-label {
    color: #FFFEF8;
    font-size: 14px; font-weight: 700;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    letter-spacing: 0.4px;
    margin-bottom: 8px;
  }
  .points-label .pts-num { color: #FFD173; font-size: 20px; }

  /* Submit / Clear buttons */
  .action-row {
    display: flex; gap: 10px; align-items: center;
  }
  .btn {
    border: none; cursor: pointer;
    font-family: 'Nunito', '-apple-system', system-ui, sans-serif; font-weight: 700;
    padding: 11px 24px; border-radius: 26px;
    font-size: 16px; letter-spacing: 0.6px;
    transition: transform 0.12s, opacity 0.2s, box-shadow 0.2s;
  }
  .btn:active { transform: translateY(2px); }
  .btn.clear {
    background: rgba(255,253,243,0.85);
    color: #6B4A2A;
    box-shadow: 0 3px 0 rgba(80,55,25,0.6), 0 4px 10px rgba(0,0,0,0.25);
  }
  .btn.submit {
    background: linear-gradient(180deg, #FFFEF8 0%, #F2EAD0 100%);
    color: #B8893A;
    box-shadow: 0 3px 0 #8C6628, 0 4px 10px rgba(0,0,0,0.3);
    opacity: 0.45;
    pointer-events: none;
  }
  .btn.submit.ready {
    opacity: 1; pointer-events: auto;
    color: #C2410C;
    animation: submitPulse 1.6s ease-in-out infinite;
  }
  @keyframes submitPulse {
    0%,100% { transform: scale(1); }
    50%     { transform: scale(1.06); }
  }
  .btn.submit.hint::after {
    content: ''; position: absolute; inset: -6px;
    border-radius: 32px;
    border: 3px solid #FFFEF8;
    pointer-events: none;
    animation: hintPulse 1s ease-in-out infinite;
  }

  /* --- Tile board --- */
  .board {
    position: absolute;
    top: 22%; left: 50%; transform: translateX(-50%);
    width: 360px; height: 320px;
    z-index: 5;
  }
  /* Real Sparrows tile per supplied SVGs:
     Unlocked  → 40×62 rx=16, fill #FFB000, drop-shadow 6px x 2px y, no blur, opacity 0.2
     Locked    → fill #292429, 1px stroke #FFB000, same shadow
     Selected  → fill #FFFFFF, drop-shadow 37px x 15px y, no blur, opacity 0.2 (in-tray look) */
  .tile {
    position: absolute;
    width: 56px; height: 86px;          /* 40:62 ratio scaled to 56:86 */
    border-radius: 16px;
    background: #FFB000;
    box-shadow: 6px 2px 0 rgba(0,0,0,0.2);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: #1A1014;
    font-family: 'Nunito', '-apple-system', system-ui, sans-serif;
    font-weight: 700; font-size: 30px;
    line-height: 1;
    cursor: pointer;
    transition: transform 0.18s cubic-bezier(.5,1.5,.6,1.0), background 0.2s, color 0.2s, opacity 0.25s;
    padding-top: 14px;
    border: 0;
  }
  .tile .points { font-size: 11px; font-weight: 700; margin-top: 8px; color: #1A1014; opacity: 0.9; }
  .tile.layer-1 { z-index: 10; }
  .tile.layer-1:active { transform: translate(3px, 1px); box-shadow: 3px 1px 0 rgba(0,0,0,0.18); }
  .tile.layer-1.removing { pointer-events: none; animation: tileLift 0.55s ease-in forwards; }

  /* Selected: tile has flown to the tray — ghost the board slot */
  .tile.layer-1.selected {
    opacity: 0.18;
    pointer-events: none;
    transform: scale(0.92);
    box-shadow: none;
    background: #FFFFFF;
    color: #B8893A;
    transform: translateY(-3px);
    box-shadow: 12px 6px 0 rgba(0,0,0,0.2);   /* scaled-down version of 37/15 spec for our tile size */
    z-index: 11;
  }
  .tile.layer-1.selected .points { color: #B8893A; }

  /* Locked: SVG spec — dark fill with orange border */
  .tile.layer-0 {
    z-index: 4;
    background: #292429;
    border: 1px solid #FFB000;
    color: #FFB000;
    box-shadow: 6px 2px 0 rgba(0,0,0,0.25);
    pointer-events: none;
    transform: scale(0.94);
    opacity: 0.95;
    padding-top: 13px;
  }
  .tile.layer-0 .points { color: #FFB000; opacity: 0.85; }
  .tile.layer-0.clearing { animation: tileFade 0.55s ease-out forwards; }

  /* Unlock flip — when a tile becomes accessible after a submit, it does a 3D flip
     from locked face (dark + orange border) to unlocked face (orange) */
  .tile.layer-1.unlocking {
    animation: unlockFlip 0.6s ease-in-out;
    transform-origin: center;
  }
  @keyframes unlockFlip {
    0%   { transform: perspective(400px) rotateY(0deg);   background: #292429; color: #FFB000; border: 1px solid #FFB000; }
    49%  { transform: perspective(400px) rotateY(90deg);  background: #292429; color: #FFB000; border: 1px solid #FFB000; }
    51%  { transform: perspective(400px) rotateY(-90deg); background: #FFB000; color: #1A1014; border: 0; }
    100% { transform: perspective(400px) rotateY(0deg);   background: #FFB000; color: #1A1014; border: 0; }
  }

  /* Flyer — temporary tile that animates from board → tray (and back on deselect) */
  .tile-flyer {
    position: fixed;
    border-radius: 16px;
    background: #FFFFFF;
    color: #B8893A;
    box-shadow: 12px 6px 0 rgba(0,0,0,0.2);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-family: 'Nunito', '-apple-system', system-ui, sans-serif;
    font-weight: 700; font-size: 30px;
    pointer-events: none;
    z-index: 50;
    transition: transform 0.28s cubic-bezier(.4,.9,.5,1.1), opacity 0.28s ease;
    will-change: transform, opacity;
  }
  .word-slot.filled { cursor: pointer; pointer-events: auto; }
  @keyframes tileLift {
    0%   { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; }
    50%  { transform: translateY(-32px) scale(1.08) rotate(-7deg); opacity: 0.95; }
    100% { transform: translateY(-64px) scale(0.55) rotate(-16deg); opacity: 0; }
  }
  @keyframes tileFade {
    0%   { opacity: 0.72; transform: scale(0.92); }
    50%  { opacity: 0.5; transform: scale(0.95); }
    100% { opacity: 0; transform: scale(0.7) translateY(8px); }
  }

  .tile.hint::after {
    content: ''; position: absolute; inset: -6px;
    border-radius: 18px;
    border: 3px solid #FFFEF8;
    box-shadow: 0 0 14px rgba(255,254,248,0.8);
    animation: hintPulse 1s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes hintPulse {
    0%,100% { transform: scale(1); opacity: 0.85; }
    50%     { transform: scale(1.06); opacity: 1; }
  }

  /* --- Pointing arrow --- */
  .arrow {
    position: absolute; width: 36px; height: 36px;
    z-index: 9; pointer-events: none;
    transition: top 0.35s ease, left 0.35s ease;
    opacity: 0;
  }
  .arrow.visible { opacity: 1; animation: bounceArrow 0.7s ease-in-out infinite; }
  .arrow::before {
    content: ''; position: absolute;
    top: 0; left: 50%; transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 14px solid transparent;
    border-right: 14px solid transparent;
    border-top: 22px solid #FFFEF8;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
  }
  @keyframes bounceArrow { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }

  /* --- Feather burst --- */
  .feather {
    position: absolute; width: 12px; height: 22px;
    background: linear-gradient(180deg, #FFF 0%, #FBBF24 100%);
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    pointer-events: none; opacity: 0; z-index: 12;
  }
  .feather.burst { animation: featherBurst 1.2s ease-out forwards; }
  @keyframes featherBurst {
    0%   { opacity: 1; transform: translate(0, 0) rotate(0deg) scale(0.5); }
    100% { opacity: 0; transform: translate(var(--dx), var(--dy)) rotate(var(--r)) scale(1.2); }
  }

  /* --- Score popup --- */
  .score-pop {
    position: absolute; top: 22%; left: 50%; transform: translateX(-50%);
    color: #FFD075; font-weight: 800; font-size: 44px;
    pointer-events: none; opacity: 0; z-index: 14;
    text-shadow: 0 2px 8px rgba(0,0,0,0.55);
  }
  .score-pop.show { animation: scorePop 1s ease-out forwards; }
  @keyframes scorePop {
    0%   { opacity: 0; transform: translateX(-50%) translateY(20px) scale(0.6); }
    30%  { opacity: 1; transform: translateX(-50%) translateY(0) scale(1.1); }
    100% { opacity: 0; transform: translateX(-50%) translateY(-40px) scale(1); }
  }

  /* --- End card --- */
  #endcard {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, #4A6E47 0%, #3D5A3F 70%, #2D4332 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 24px;
    z-index: 100;
    opacity: 0; pointer-events: none;
    transition: opacity 0.5s ease;
  }
  #endcard.show { opacity: 1; pointer-events: auto; }
  #endcard .logo {
    width: 130px; height: 130px;
    border-radius: 28px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.4);
    animation: logoIn 0.6s ease-out;
  }
  @keyframes logoIn { from { transform: scale(0.6); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  #endcard h1 {
    margin-top: 22px; color: #FFFEF8;
    font-size: 28px; font-weight: 700; text-align: center;
    text-shadow: 0 2px 4px rgba(0,0,0,0.3);
  }
  #endcard p {
    margin-top: 10px; color: #E8DDC2;
    font-size: 16px; text-align: center;
    max-width: 280px; line-height: 1.45;
  }
  .install {
    margin-top: 32px;
    background: linear-gradient(180deg, #FFD173 0%, #F0B14F 100%);
    color: #2C1B0C; border: 2px solid #B8893A;
    padding: 16px 48px; border-radius: 32px;
    font-size: 20px; font-weight: 700; letter-spacing: 1px;
    box-shadow: 0 4px 0 #8C6628, 0 6px 16px rgba(0,0,0,0.3);
    cursor: pointer; font-family: 'Nunito', '-apple-system', system-ui, sans-serif;
    animation: pulse 1.6s ease-in-out infinite;
  }
  .install:active { transform: translateY(2px); box-shadow: 0 2px 0 #8C6628, 0 3px 8px rgba(0,0,0,0.3); }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.04); } }

  #endcard .bird { position: absolute; }
  #endcard .bird.eb1 { top: 14%; left: 14%; width: 42px; height: 80px; background-image: url('assets/birds/bird_orange.png'); animation: idleBobble 2s ease-in-out infinite; }
  #endcard .bird.eb2 { top: 14%; right: 14%; width: 70px; height: 88px; background-image: url('assets/birds/bird_gray.png'); animation: idleBobble2 2.3s ease-in-out infinite; }
</style>
</head>
<body>
<div id="stage">
  <!-- Map background — bg + houses live in a panning "world" div so they
       move together as the camera drifts up and down. -->
  <div class="world" id="world">
    <img class="bg-img" id="bgImg" src="assets/bg/bg.png" alt="">
    <div class="house h1" id="house1"><img src="assets/bg/birdhouse1.png" alt=""></div>
    <div class="house h2" id="house2"><img src="assets/bg/birdhouse2.png" alt=""></div>
  </div>

  <div class="banner" id="banner">
    Spell <span class="target" id="targetWord">NEST</span>
    <span class="hint-line">Tap the top tiles to spell</span>
  </div>
  <div class="arrow" id="arrow"></div>
  <div class="board" id="board"></div>
  <div class="score-pop" id="scorePop">+50</div>
  <div class="selection-bar">
    <div class="word-output" id="wordOutput"></div>
    <div class="points-label"><span class="pts-num" id="ptsNum">0</span> points</div>
    <div class="action-row">
      <button class="btn clear" id="clearBtn">Clear</button>
      <button class="btn submit" id="submitBtn" style="position: relative;">Submit</button>
    </div>
  </div>
</div>

<div id="endcard">
  <div class="bird eb1"></div>
  <div class="bird eb2"></div>
  <img class="logo" src="assets/ui/logo.png" alt="Sparrows: Word Strategy">
  <h1>Sparrows: Word Strategy</h1>
  <p>The relaxing word puzzle for everyone. Stack tiles, spell words, set your own pace.</p>
  <button class="install" id="installBtn">PLAY FREE</button>
</div>

<script>
/* ============================================================ MRAID ============================================================ */
(function() {
  function whenReady(cb) {
    if (typeof mraid !== 'undefined' && mraid.getState && mraid.getState() === 'loading') {
      mraid.addEventListener('ready', cb);
    } else cb();
  }
  window._sparrowsClick = function() {
    var url = 'https://apps.apple.com/app/id1606645393';
    if (typeof mraid !== 'undefined' && mraid.open) {
      try { mraid.open(url); return; } catch (e) {}
    }
    window.open(url, '_blank');
  };
  whenReady(function() {});
})();

/* ============================================================ Letter point values (Scrabble-ish, matching Sparrows feel) ============================================================ */
const LETTER_POINTS = {
  A:1,B:3,C:3,D:2,E:1,F:4,G:2,H:4,I:1,J:8,K:5,L:1,M:3,N:1,O:1,P:3,Q:10,R:1,S:1,T:1,U:1,V:4,W:4,X:8,Y:4,Z:10
};
function pts(letter) { return LETTER_POINTS[letter] || 1; }

/* ============================================================ Game state ============================================================ */
const STATE = {
  phase: 'tutorial',
  tiles: [],     /* unified array of {id, letter, layer, col, blockedBy:[ids], removed} */
  selected: [],  /* tile ids in tap order */
  targetWord: 'NEST',
  wordsCompleted: 0,
  locked: false,
};

/* Trimmed dictionary — all 2–6 letter words spellable from the playable’s letter pool
   (A,B,D,E,G,H,I,L,M,N,O,P,R,S,T,U). Each letter appears at most once on the boards,

/* Word letters distributed across BOTH layers — bottom tiles are uncovered as tops are removed.
   Layout: 2 top tiles cover 2 bottom tiles; tap order alternates layers. */
/* Boards now use the actual game's grid layout + blocking:
   - Each layer is a 4×3 grid (col 0..3 × row 0..2)
   - Top tile at (col, row) blocks bottom tiles at (col-1,row), (col,row), (col-1,row+1), (col,row+1)
   - Half-tile down-left offset between layers (skill's spec)
   - Partial fill (some grid cells empty) for visual interest
   blockedBy is auto-computed from the rule via buildBlockedBy(). */

const MAIN_BOARD = {
  tiles: [
    /* Tutorial: top NEST (row 0), bottom BIRD (row 0) — 1 row per layer */
    {id:'b', letter:'B', layer:0, row:0, col:0},
    {id:'i', letter:'I', layer:0, row:0, col:1},
    {id:'r', letter:'R', layer:0, row:0, col:2},
    {id:'d', letter:'D', layer:0, row:0, col:3},
    {id:'n', letter:'N', layer:1, row:0, col:0},
    {id:'e', letter:'E', layer:1, row:0, col:1},
    {id:'s', letter:'S', layer:1, row:0, col:2},
    {id:'t', letter:'T', layer:1, row:0, col:3},
  ],
};

/* Free-play 4×3 with partial fill — 6 top + 9 bottom = 15 tiles.
   Top in middle 2 cols (cols 1,2), bottom in left 3 cols (cols 0,1,2).
   Starting accessible: 6 top tiles (E T R A N I) — hundreds of words.
   Bottom layer (D L O G H U P S M) uncovers as tops are submitted. */
const FREEPLAY_BOARD = {
  tiles: [
    /* Bottom layer (layer 0) — 9 tiles in cols 0..2 × rows 0..2 */
    {id:'fd', letter:'D', layer:0, row:0, col:0},
    {id:'fl', letter:'L', layer:0, row:0, col:1},
    {id:'fo', letter:'O', layer:0, row:0, col:2},
    {id:'fg', letter:'G', layer:0, row:1, col:0},
    {id:'fh', letter:'H', layer:0, row:1, col:1},
    {id:'fu', letter:'U', layer:0, row:1, col:2},
    {id:'fp', letter:'P', layer:0, row:2, col:0},
    {id:'fs', letter:'S', layer:0, row:2, col:1},
    {id:'fm', letter:'M', layer:0, row:2, col:2},
    /* Top layer (layer 1) — 6 tiles in middle (cols 1,2 × rows 0..2) */
    {id:'fe', letter:'E', layer:1, row:0, col:1},
    {id:'ft', letter:'T', layer:1, row:0, col:2},
    {id:'fr', letter:'R', layer:1, row:1, col:1},
    {id:'fa', letter:'A', layer:1, row:1, col:2},
    {id:'fn', letter:'N', layer:1, row:2, col:1},
    {id:'fi', letter:'I', layer:1, row:2, col:2},
  ],
};

/* Auto-compute blockedBy from the skill's rule:
   A higher-layer tile at (col, row) blocks the lower-layer tile at (col-1,row), (col,row),
   (col-1,row+1), or (col,row+1). For each lower tile, find all higher tiles whose blocking
   range covers it. */
function buildBlockedBy(tiles) {
  tiles.forEach(t => { t.blockedBy = []; });
  for (const lower of tiles) {
    for (const higher of tiles) {
      if (higher.layer !== lower.layer + 1) continue;
      const dx = lower.col - higher.col;     /* lower at (c-1,r) → dx=-1; (c,r) → dx=0 */
      const dy = lower.row - higher.row;     /* lower at (c,r) → dy=0; (c,r+1) → dy=+1 */
      if ((dx === -1 || dx === 0) && (dy === 0 || dy === 1)) {
        lower.blockedBy.push(higher.id);
      }
    }
  }
  return tiles;
}

const TUTORIAL_TARGET = 'NEST';
const FREEPLAY_TARGETS = ['BIRD'];   /* second tutorial word, then transition to FREEPLAY_BOARD */
const MIN_WORD_LEN = 3;

function buildTiles(config) {
  const tiles = config.tiles.map(t => ({ ...t, removed: false }));
  buildBlockedBy(tiles);
  /* seed wasAccessible to current accessibility so initial render does not flip */
  tiles.forEach(t => {
    t.wasAccessible = t.blockedBy.length === 0;
  });
  return tiles;
}

/* ============================================================ Render ============================================================ */
const board = document.getElementById('board');
const wordOutput = document.getElementById('wordOutput');
const banner = document.getElementById('banner');
const arrow = document.getElementById('arrow');
const scorePop = document.getElementById('scorePop');

function tileEl(letter, layerClass, dataAttrs) {
  const el = document.createElement('div');
  el.className = 'tile ' + layerClass;
  Object.keys(dataAttrs).forEach(k => el.dataset[k] = dataAttrs[k]);
  const letterEl = document.createElement('span');
  letterEl.textContent = letter;
  const ptsEl = document.createElement('span');
  ptsEl.className = 'points';
  ptsEl.textContent = pts(letter);
  el.appendChild(letterEl);
  el.appendChild(ptsEl);
  return el;
}

function isAccessible(tile) {
  if (tile.removed) return false;
  return tile.blockedBy.every(blockerId => {
    const blocker = STATE.tiles.find(t => t.id === blockerId);
    return blocker && blocker.removed;
  });
}

/* Layout constants — tiles are 56×86 (taller than wide).
   Col pitch tracks tile width, row pitch tracks tile height. */
const TILE_WIDTH = 56;
const TILE_HEIGHT = 86;
const COL_PITCH = 60;     /* tile width 56 + 4px gap */
const ROW_PITCH = 90;     /* tile height 86 + 4px gap (row pitch > col pitch because tile is tall) */
/* Aliases for legacy refs */
const TILE_W = COL_PITCH;
const TILE_PITCH_Y = ROW_PITCH;
const BOARD_WIDTH = 360;

/* Renderer — pixel position uses half-tile offset between layers, matching the
   actual game's "upper layer offset down-left by half a tile" convention.
   Layer L tile at grid (col, row) renders at pixel:
     x = (col - L * 0.5) * TILE_W
     y = (row - L * 0.5) * TILE_PITCH_Y       (negative = up — top layer above bottom)
   Higher layers thus appear up-and-right (in pixel space, "up" is smaller y; "left" of the rule
   refers to game-grid convention which corresponds to up-right visually).  */
function renderBoard() {
  board.innerHTML = '';
  STATE.tiles.forEach(t => { if (t.row === undefined) t.row = 0; });

  /* Compute pixel positions for ALL tiles (including removed) so the layout stays
     anchored as tiles are cleared — bottom layer must NOT shift when top clears.
     Upper layers offset DOWN-LEFT (skill spec):
       px = (col - layer*0.5) * COL_PITCH   // higher layer → shifted left
       py = (row + layer*0.5) * ROW_PITCH   // higher layer → shifted DOWN */
  const allPositions = STATE.tiles.map(t => ({
    t,
    px: (t.col - t.layer * 0.5) * TILE_W,
    py: (t.row + t.layer * 0.5) * TILE_PITCH_Y
  }));
  if (allPositions.length === 0) return;
  const minPx = Math.min(...allPositions.map(p => p.px));
  const maxPx = Math.max(...allPositions.map(p => p.px));
  const minPy = Math.min(...allPositions.map(p => p.py));

  /* Center horizontally; anchor top vertically — bounds use ALL tiles so they're stable */
  const totalW = (maxPx - minPx) + TILE_WIDTH;
  const startX = (BOARD_WIDTH - totalW) / 2 - minPx;
  const startY = -minPy;

  /* Draw lower layers first so higher layers paint on top */
  const visiblePositions = allPositions.filter(p => !p.t.removed);
  if (visiblePositions.length === 0) return;
  const sorted = visiblePositions.slice().sort((a, b) => a.t.layer - b.t.layer);
  sorted.forEach(({ t, px, py }) => {
    const accessible = isAccessible(t);
    const justUnlocked = accessible && !t.wasAccessible;
    t.wasAccessible = accessible;
    const cls = accessible ? 'layer-1' : 'layer-0';
    const el = tileEl(t.letter, cls, { id: t.id, letter: t.letter });
    el.style.left = (startX + px) + 'px';
    el.style.top  = (startY + py) + 'px';
    if (STATE.selected.includes(t.id)) el.classList.add('selected');
    if (justUnlocked) el.classList.add('unlocking');
    if (accessible) {
      el.addEventListener('click', () => onTileTap(t.id));
      el.style.zIndex = 10 + t.layer;
    } else {
      el.style.zIndex = 4 + t.layer;
    }
    board.appendChild(el);
  });
}

function renderWordOutput(targetLen) {
  wordOutput.innerHTML = '';
  for (let i = 0; i < targetLen; i++) {
    const s = document.createElement('div');
    s.className = 'word-slot';
    s.dataset.slotIdx = i;
    s.innerHTML = '<span class="ws-letter"></span><span class="ws-pts"></span>';
    s.addEventListener('click', () => onTraySlotTap(i));
    wordOutput.appendChild(s);
  }
}

/* Tap a filled tray slot — deselect that tile (only the last in the row, to keep
   the word readable; tapping a middle one is ignored). */
function onTraySlotTap(slotIdx) {
  if (STATE.locked || STATE.phase === 'end') return;
  if (slotIdx >= STATE.selected.length) return;
  if (slotIdx !== STATE.selected.length - 1) return;
  const id = STATE.selected[slotIdx];
  flyTrayToBoard(id, slotIdx);
  STATE.selected.pop();
  updateAfterSelectionChange();
}

function updateWordOutput() {
  const slots = wordOutput.querySelectorAll('.word-slot');
  let pointsTotal = 0;
  STATE.selected.forEach((id, i) => {
    const t = STATE.tiles.find(x => x.id === id);
    if (slots[i] && t) {
      slots[i].querySelector('.ws-letter').textContent = t.letter;
      slots[i].querySelector('.ws-pts').textContent = pts(t.letter);
      slots[i].classList.add('filled');
      pointsTotal += pts(t.letter);
    }
  });
  for (let i = STATE.selected.length; i < slots.length; i++) {
    slots[i].querySelector('.ws-letter').textContent = '';
    slots[i].querySelector('.ws-pts').textContent = '';
    slots[i].classList.remove('filled');
  }
  document.getElementById('ptsNum').textContent = pointsTotal;
}

/* ============================================================ Fly-to-tray animation ============================================================ */
function flyTile(letter, fromRect, toRect, durationMs) {
  if (!fromRect || !toRect) return;
  const flyer = document.createElement('div');
  flyer.className = 'tile-flyer';
  flyer.style.left = fromRect.left + 'px';
  flyer.style.top  = fromRect.top  + 'px';
  flyer.style.width  = fromRect.width  + 'px';
  flyer.style.height = fromRect.height + 'px';
  const lEl = document.createElement('span');
  lEl.textContent = letter;
  const pEl = document.createElement('span');
  pEl.style.cssText = 'font-size:11px;font-weight:700;margin-top:6px;line-height:1;';
  pEl.textContent = pts(letter);
  flyer.appendChild(lEl);
  flyer.appendChild(pEl);
  document.body.appendChild(flyer);
  const dx = (toRect.left + toRect.width/2) - (fromRect.left + fromRect.width/2);
  const dy = (toRect.top  + toRect.height/2) - (fromRect.top  + fromRect.height/2);
  const scale = toRect.width / fromRect.width;
  requestAnimationFrame(() => {
    flyer.style.transform = `translate(${dx}px, ${dy}px) scale(${scale})`;
  });
  setTimeout(() => flyer.remove(), durationMs || 300);
}

function flyBoardToTray(tileId, slotIdx) {
  const boardEl = board.querySelector(`[data-id="${tileId}"]`);
  const slot = wordOutput.querySelectorAll('.word-slot')[slotIdx];
  if (!boardEl || !slot) return;
  const tile = STATE.tiles.find(t => t.id === tileId);
  flyTile(tile.letter, boardEl.getBoundingClientRect(), slot.getBoundingClientRect(), 300);
}

function flyTrayToBoard(tileId, slotIdx) {
  const slot = wordOutput.querySelectorAll('.word-slot')[slotIdx];
  const boardEl = board.querySelector(`[data-id="${tileId}"]`);
  if (!boardEl || !slot) return;
  const tile = STATE.tiles.find(t => t.id === tileId);
  flyTile(tile.letter, slot.getBoundingClientRect(), boardEl.getBoundingClientRect(), 300);
}

/* ============================================================ Tap handling ============================================================ */
function onTileTap(id) {
  if (STATE.locked || STATE.phase === 'end') return;
  const tile = STATE.tiles.find(t => t.id === id);
  if (!tile || tile.removed) return;

  /* Toggle: if already selected, deselect (only if it's the last selected, to keep order valid) */
  const idx = STATE.selected.indexOf(id);
  if (idx >= 0) {
    if (idx === STATE.selected.length - 1) {
      flyTrayToBoard(id, idx);
      STATE.selected.pop();
    } else return; /* tapping a middle-selected tile does nothing */
    updateAfterSelectionChange();
    return;
  }

  if (!isAccessible(tile)) {
    /* shake — blocked */
    const el = board.querySelector(`[data-id="${id}"]`);
    if (el) el.animate(
      [{transform:'translateX(0)'},{transform:'translateX(-4px)'},{transform:'translateX(4px)'},{transform:'translateX(0)'}],
      {duration: 240, easing: 'ease-out'}
    );
    return;
  }

  const newSlotIdx = STATE.selected.length;
  STATE.selected.push(id);
  flyBoardToTray(id, newSlotIdx);
  updateAfterSelectionChange();

  if (STATE.phase === 'tutorial' || STATE.phase === 'tutorial2') {
    const word = currentWord();
    if (word.length > 0 && word === STATE.targetWord) {
      hideArrow();
      pointArrowAtSubmit();
    } else if (STATE.targetWord.startsWith(word)) {
      pointToNextTutorialLetter();
    } else {
      setTimeout(clearSelection, 350);
    }
  }
}

function updateAfterSelectionChange() {
  renderBoard();
  updateWordOutput();
  const word = currentWord();
  const valid = (word.length > 0 && word === STATE.targetWord) || (word.length >= MIN_WORD_LEN && VALID_WORDS.has(word));
  const submitBtn = document.getElementById('submitBtn');
  submitBtn.classList.toggle('ready', valid);
}

function currentWord() {
  return STATE.selected.map(id => STATE.tiles.find(t => t.id === id).letter).join('');
}

function clearSelection() {
  STATE.selected = [];
  updateAfterSelectionChange();
  if (STATE.phase === 'tutorial') pointToNextTutorialLetter();
}

function onSubmit() {
  if (STATE.locked) return;
  const word = currentWord();
  const valid = (word.length > 0 && word === STATE.targetWord) || (word.length >= MIN_WORD_LEN && VALID_WORDS.has(word));
  if (!valid) {
    /* shake the selection bar */
    const bar = document.querySelector('.word-output');
    bar.animate(
      [{transform:'translateX(0)'},{transform:'translateX(-6px)'},{transform:'translateX(6px)'},{transform:'translateX(0)'}],
      {duration: 280, easing: 'ease-out'}
    );
    return;
  }
  /* Animate selected tiles flying off, then remove them and re-render */
  STATE.locked = true;
  STATE.selected.forEach(id => {
    const el = board.querySelector(`[data-id="${id}"]`);
    if (el) el.classList.add('removing');
  });
  burstFeathers();
  showScorePop('+' + (10 * word.length));

  setTimeout(() => {
    STATE.selected.forEach(id => {
      const t = STATE.tiles.find(x => x.id === id);
      if (t) t.removed = true;
    });
    STATE.selected = [];
    STATE.wordsCompleted++;
    renderBoard();
    updateWordOutput();
    document.getElementById('submitBtn').classList.remove('ready', 'hint');
    hideArrow();
    STATE.locked = false;

    /* Phase progression:
       tutorial → tutorial2 (after NEST submitted, BIRD becomes target)
       tutorial2 → freeplay (after BIRD submitted, load bigger pyramid board)
       freeplay → end (after several words OR board nearly empty) */
    if (STATE.phase === 'tutorial') {
      STATE.phase = 'tutorial2';
      banner.innerHTML = 'Nice! Now spell <span class="target">' + FREEPLAY_TARGETS[0] + '</span><span class="hint-line">The board uncovered new letters</span>';
      STATE.targetWord = FREEPLAY_TARGETS[0];
      renderWordOutput(STATE.targetWord.length);
      setTimeout(() => pointToNextTutorialLetter(), 400);
    } else if (STATE.phase === 'tutorial2') {
      loadFreePlayBoard();
    } else if (STATE.phase === 'freeplay') {
      const remaining = STATE.tiles.filter(t => !t.removed).length;
      const accessibleLetters = STATE.tiles.filter(t => !t.removed && isAccessible(t)).map(t => t.letter);
      const stillPlayable = countPlayableWords(accessibleLetters);
      if (STATE.wordsCompleted >= 6 || remaining < 2 || stillPlayable.length === 0) {
        showEndCard();
      } else {
        banner.innerHTML = 'Nice! <span class="hint-line">Keep going — find another word</span>';
        renderWordOutput(6);
      }
    }
  }, 600);
}

function loadFreePlayBoard() {
  STATE.phase = 'freeplay';
  STATE.locked = false;
  STATE.selected = [];
  STATE.targetWord = '';
  STATE.tiles = buildTiles(FREEPLAY_BOARD);
  banner.innerHTML = 'Spell <span class="target">any word</span><span class="hint-line">2+ letters — uncover more by clearing tops</span>';
  renderBoard();
  renderWordOutput(6);
  hideArrow();
  /* Light difficulty hint — log how many words can be spelled from starting accessible letters */
  if (typeof console !== 'undefined') {
    const startLetters = STATE.tiles.filter(t => isAccessible(t)).map(t => t.letter);
    const playable = countPlayableWords(startLetters);
    console.log('[Sparrows playable] Free-play start letters:', startLetters.join(''),
                '| Spellable dict words from start:', playable.length,
                '| Top examples:', playable.slice(0, 8));
  }
}

/* Difficulty hint helper: enumerate dict words spellable from a multiset of letters.
   Doesn't account for layer ordering (just upper bound) but useful for sanity checking
   that a generated board has enough word options. */
function countPlayableWords(letterMultiset) {
  const counts = {};
  letterMultiset.forEach(c => counts[c] = (counts[c] || 0) + 1);
  const playable = [];
  for (const word of VALID_WORDS) {
    if (word.length < MIN_WORD_LEN) continue;
    const wc = {};
    for (const c of word) wc[c] = (wc[c] || 0) + 1;
    let ok = true;
    for (const c in wc) if ((counts[c] || 0) < wc[c]) { ok = false; break; }
    if (ok) playable.push(word);
  }
  return playable.sort((a, b) => b.length - a.length);
}

function pointToNextTutorialLetter() {
  const word = currentWord();
  const next = STATE.targetWord[word.length];
  if (!next) return;
  const candidate = STATE.tiles.find(t => !t.removed && t.letter === next && isAccessible(t) && !STATE.selected.includes(t.id));
  if (!candidate) return;
  const el = board.querySelector(`[data-id="${candidate.id}"]`);
  if (!el) return;
  const r = el.getBoundingClientRect();
  arrow.style.left = (r.left + r.width/2 - 18) + 'px';
  arrow.style.top  = (r.top - 38) + 'px';
  arrow.classList.add('visible');
  board.querySelectorAll('.tile.hint').forEach(t => t.classList.remove('hint'));
  el.classList.add('hint');
}

function pointArrowAtSubmit() {
  const submitBtn = document.getElementById('submitBtn');
  submitBtn.classList.add('hint');
  /* Hide top-of-tile arrow */
  arrow.classList.remove('visible');
}

function hideArrow() {
  arrow.classList.remove('visible');
  board.querySelectorAll('.tile.hint').forEach(t => t.classList.remove('hint'));
}


function burstFeathers() {
  const stage = document.getElementById('stage');
  const cx = stage.clientWidth / 2;
  const cy = stage.clientHeight * 0.30;
  for (let i = 0; i < 14; i++) {
    const f = document.createElement('div');
    f.className = 'feather';
    f.style.left = cx + 'px';
    f.style.top = cy + 'px';
    const angle = (Math.PI * 2 * i / 14) + (Math.random() * 0.4);
    const dist = 90 + Math.random() * 60;
    f.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
    f.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
    f.style.setProperty('--r', (Math.random() * 720 - 360) + 'deg');
    stage.appendChild(f);
    requestAnimationFrame(() => f.classList.add('burst'));
    setTimeout(() => f.remove(), 1300);
  }
}

function showScorePop(text) {
  scorePop.textContent = text;
  scorePop.classList.remove('show');
  void scorePop.offsetWidth;
  scorePop.classList.add('show');
}

function showEndCard() {
  STATE.phase = 'end';
  document.getElementById('endcard').classList.add('show');
}
document.getElementById('installBtn').addEventListener('click', window._sparrowsClick);
document.getElementById('endcard').addEventListener('click', function(e) {
  if (e.target.id === 'installBtn') return;
  window._sparrowsClick();
});

/* Lay out bg.png (1080×3102) anchored to bottom-center of stage with cover scaling,
   then place birdhouses at the supplied red-dot hook positions, with each house's
   roof-peak anchor aligned to its dot and its swing pivot at the same point. */
const BG_NAT = { w: 1080, h: 3102 };
const HOUSES = [
  /* dot positions found in bg-houseplacements.png; anchors found in *-anchor.png */
  { id: 'house1', dot: [903, 828],  size: [242, 494], anchor: [100, 6] },
  { id: 'house2', dot: [241, 2011], size: [329, 440], anchor: [164, 6] },
];
function layoutBackground() {
  const stage = document.getElementById('stage');
  const sw = stage.clientWidth, sh = stage.clientHeight;
  if (!sw || !sh) return;
  const scale = Math.max(sw / BG_NAT.w, sh / BG_NAT.h);   /* cover */
  const drawW = BG_NAT.w * scale, drawH = BG_NAT.h * scale;
  const offX = (sw - drawW) / 2;                          /* center horizontally */
  const offY = sh - drawH;                                /* anchor bottom */
  /* pan range — how far the world can travel down before its top edge enters view */
  stage.style.setProperty('--pan-max', Math.max(0, drawH - sh) + 'px');
  const bg = document.getElementById('bgImg');
  bg.style.left = offX + 'px';
  bg.style.top  = offY + 'px';
  bg.style.width  = drawW + 'px';
  bg.style.height = drawH + 'px';
  HOUSES.forEach(h => {
    const el = document.getElementById(h.id);
    const w = h.size[0] * scale;
    const hgt = h.size[1] * scale;
    /* place so the anchor pixel inside the house lands on the dot in the bg */
    const dotX = offX + h.dot[0] * scale;
    const dotY = offY + h.dot[1] * scale;
    const ax = h.anchor[0] * scale;
    const ay = h.anchor[1] * scale;
    el.style.width  = w + 'px';
    el.style.height = hgt + 'px';
    el.style.left = (dotX - ax) + 'px';
    el.style.top  = (dotY - ay) + 'px';
    /* swing pivot = same anchor point */
    el.style.transformOrigin = ax + 'px ' + ay + 'px';
  });
}

function init() {
  layoutBackground();
  window.addEventListener('resize', layoutBackground);
  /* In case bg.png is still loading on first call */
  const bg = document.getElementById('bgImg');
  if (bg && !bg.complete) bg.addEventListener('load', layoutBackground);

  STATE.targetWord = TUTORIAL_TARGET;
  STATE.tiles = buildTiles(MAIN_BOARD);
  renderBoard();
  renderWordOutput(STATE.targetWord.length);
  setTimeout(pointToNextTutorialLetter, 600);

  document.getElementById('submitBtn').addEventListener('click', onSubmit);
  document.getElementById('clearBtn').addEventListener('click', clearSelection);
  /* No force-end timer — Unity Ads container handles skip/close UI itself */
}

if (document.readyState === 'complete' || document.readyState === 'interactive') init();
else document.addEventListener('DOMContentLoaded', init);
</script>
